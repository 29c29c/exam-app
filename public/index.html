<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AI 智能题库</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#007AFF',
                        secondary: '#5856D6',
                        success: '#34C759',
                        warning: '#FF9500',
                        danger: '#FF3B30',
                        background: '#F2F2F7',
                    },
                    boxShadow: {
                        ios: '0 4px 20px -5px rgba(0, 0, 0, 0.1)',
                        float: '0 8px 30px rgba(0, 0, 0, 0.12)',
                    },
                    animation: {
                        'slide-up': 'slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1)',
                    },
                    keyframes: {
                        slideUp: { '0%': { transform: 'translateY(100%)' }, '100%': { transform: 'translateY(0)' } },
                    },
                },
            },
        };
    </script>

    <script src="https://lib.baomitu.com/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://lib.baomitu.com/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://lib.baomitu.com/babel-standalone/6.26.0/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #F2F2F7; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: env(safe-area-inset-top); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 0.5px solid rgba(0,0,0,0.05); }
        .card-press:active { transform: scale(0.98); transition: 0.1s; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden text-slate-800">
    <div id="root" class="h-full w-full flex items-center justify-center text-center p-6 text-sm text-slate-500">
        页面初始化中...
    </div>

    <script>
        (function () {
            const showBootError = (message) => {
                const root = document.getElementById('root');
                if (!root) return;
                root.innerHTML = `
                    <div style="max-width: 720px; margin: 0 auto; padding: 24px; text-align: left;">
                        <div style="font-size: 20px; font-weight: 700; margin-bottom: 12px;">页面加载失败</div>
                        <div style="line-height: 1.7; color: #475569; white-space: pre-wrap;">${message}</div>
                    </div>
                `;
            };

            window.addEventListener('error', function (event) {
                const message = event && event.message ? event.message : '浏览器捕获到脚本错误';
                showBootError(message);
            });

            window.addEventListener('unhandledrejection', function (event) {
                const reason = event && event.reason;
                const message = reason && reason.message ? reason.message : String(reason || '存在未处理的异步错误');
                showBootError(message);
            });

            window.setTimeout(function () {
                const missing = [];
                if (!window.React) missing.push('React');
                if (!window.ReactDOM) missing.push('ReactDOM');
                if (!window.Babel) missing.push('Babel');

                if (missing.length > 0) {
                    showBootError('以下前端依赖没有加载成功：' + missing.join(', ') + '\n这通常是 CDN 资源不可达导致的。');
                }
            }, 3000);
        })();
    </script>

    <script src="/api.js"></script>
    <script src="/ai-config.js"></script>
    <script type="text/babel" src="/app.js"></script>
</body>
</html>
